name: 安全检查与测试

on:
  push:
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  test:
    name: 测试、竞态检测与构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache: true
      - name: 检查 Go 代码格式
        run: |
          files=$(find . -name '*.go' -type f)
          test -z "$(gofmt -l $files)"
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: go build ./cmd/server

  vulnerability-scan:
    name: 漏洞扫描
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
