services:
  noblack:
    build: .
    # 也可直接用已构建镜像: image: noblack:latest
    container_name: noblack
    # 显式以 root 用户和 root 组运行，避免绑定挂载目录权限不匹配。
    user: "0:0"
    ports:
      - "8080:8080"
    volumes:
      # 绑定挂载: 把宿主机 ./data 目录映射到容器 /data。
      # 词库就是 ./data/words.json, 直接在宿主机编辑即可 (fsnotify 会热加载)。
      # 首次启动若 ./data 里没有 words.json, 会用镜像内置默认词库初始化。
      - ./data:/data
    # 容器保持 root 身份运行，确保绑定挂载的 /data 可创建临时文件并原子落盘。
    environment:
      NB_ADDR: ":8080"
      NB_WORDS: "/data/words.json"
      NB_STATS: "/data/stats.json"   # 留空则不持久化统计
      NB_TOKEN: ""                    # 设为非空即开启写操作鉴权
      NB_CI: "false"                  # "true" 开启英文大小写不敏感
      NB_WATCH: "true"
    restart: unless-stopped
