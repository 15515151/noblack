services:
  noblack:
    build: .
    container_name: noblack
    user: "0:0"
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      NB_ADDR: ":8080"
      NB_WORDS: "/data/words.json"
      NB_STATS: "/data/stats.json"
      NB_TOKEN: ""
      NB_CI: "false"
      NB_WATCH: "true"
      # Pure CPU deployment. Both resident models run concurrently per request.
      NB_MODEL_SERVICE_URL: "http://127.0.0.1:8091"
      NB_MODEL_THREADS: "2"
      NB_MODEL_PASS_THRESHOLD: "0.15"
      NB_MODEL_BLOCK_THRESHOLD: "0.5"
      # Production-tuned models use max to preserve either model's risk signal.
      NB_MODEL_COMBINE_POLICY: "max"
    # MacBERT + Lite typically need roughly 1-2 GB RAM at runtime.
    restart: unless-stopped

